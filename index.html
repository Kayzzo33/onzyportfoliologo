<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designer de Logos | Portfólio Autoral</title>
    <meta name="description" content="Portfólio de identidade visual e design de logos. Uma galeria contemporânea focada na essência e aplicação de marcas.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="custom-cursor"></div>

    <header class="minimal-header">
        <div class="logo-container">
            <h1 class="brand-name">ONZY COMPANY</h1>
        </div>
        <nav class="nav-links">
            <button class="nav-btn active" data-category="logos">LOGOS</button>
            <button class="nav-btn" data-category="aplicacoes">APLICAÇÕES</button>
        </nav>
        <div class="contact-trigger">
            <a href="#contact" class="contact-link">CONTATO</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <span class="hero-subtitle">IDENTITY DESIGN</span>
                <h2 class="hero-title">A forma encontra a <br><span class="italic">essência</span>.</h2>
            </div>
        </section>

        <section class="gallery-section">
            <div id="logos-grid" class="gallery-grid active">
                <!-- Logos will be injected here -->
            </div>
            <div id="aplicacoes-grid" class="gallery-grid">
                <!-- Aplicacoes will be injected here -->
            </div>
        </section>
    </main>

    <footer id="contact" class="minimal-footer">
        <div class="footer-content">
            <p class="footer-tagline">VAMOS CRIAR ALGO MEMORÁVEL?</p>
            <a href="https://wa.me/5573988027104" class="contact-button">SOLICITAR ORÇAMENTO</a>
            <div class="footer-bottom">
                <span>© 2026 ONZY COMPANY</span>
                <span>Desenvolvido por Onzy Company</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
